<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Game Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎮 Game Editor</h1>
                <button id="newProjectBtn" class="btn btn-primary">+ New Project</button>
            </div>
            <div class="projects-list" id="projectsList"></div>
        </aside>
        
        <!-- Main Editor Area -->
        <main class="editor-area">
            <div class="no-project-selected" id="noProjectMessage">
                <div class="empty-state">
                    <span class="empty-icon">🎲</span>
                    <h2>No Project Selected</h2>
                    <p>Create a new project or select an existing one to get started.</p>
                </div>
            </div>
            
            <div class="project-editor" id="projectEditor" style="display: none;">
                <!-- Project Header -->
                <div class="project-header">
                    <div class="project-info">
                        <h2 id="projectName" class="editable" title="Click to rename"></h2>
                        <span id="projectType" class="project-type-badge"></span>
                    </div>
                    <div class="project-actions">
                        <button id="addFileBtn" class="btn btn-secondary">+ Add File</button>
                        <button id="runProjectBtn" class="btn btn-success">▶ Run</button>
                        <button id="deleteProjectBtn" class="btn btn-danger">🗑 Delete</button>
                    </div>
                </div>
                
                <!-- File Tabs -->
                <div class="file-tabs" id="fileTabs"></div>
                
                <!-- Code Editor -->
                <div class="code-editor-container">
                    <div class="editor-info">
                        <span id="currentFileName"></span>
                        <span id="saveStatus">Auto-saved</span>
                    </div>
                    <textarea id="codeEditor" class="code-editor" spellcheck="false" placeholder="Start coding..."></textarea>
                </div>
            </div>
        </main>
    </div>
    
    <!-- New Project Modal -->
    <div class="modal" id="newProjectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Project</h3>
                <button class="modal-close" id="closeNewProjectModal">&times;</button>
            </div>
            <div class="form-group">
                <label for="newProjectName">Project Name</label>
                <input type="text" id="newProjectName" placeholder="My Awesome Game">
            </div>
            <div class="form-group">
                <label>Project Type</label>
                <div class="project-type-options">
                    <label class="type-option">
                        <input type="radio" name="projectType" value="2d" checked>
                        <span class="type-card">
                            <span class="type-icon">🎮</span>
                            <span class="type-name">2D Game</span>
                            <span class="type-desc">Canvas-based 2D games</span>
                        </span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="projectType" value="app">
                        <span class="type-card">
                            <span class="type-icon">📱</span>
                            <span class="type-name">Web App</span>
                            <span class="type-desc">Standard web application</span>
                        </span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="projectType" value="webgl">
                        <span class="type-card">
                            <span class="type-icon">🎲</span>
                            <span class="type-name">WebGL 3D</span>
                            <span class="type-desc">3D graphics with WebGL</span>
                        </span>
                    </label>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelNewProject">Cancel</button>
                <button class="btn btn-primary" id="createProject">Create Project</button>
            </div>
        </div>
    </div>
    
    <!-- Add File Modal -->
    <div class="modal" id="addFileModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>Add New File</h3>
                <button class="modal-close" id="closeAddFileModal">&times;</button>
            </div>
            <div class="form-group">
                <label for="newFileName">File Name (with extension)</label>
                <input type="text" id="newFileName" placeholder="e.g., utils.js, game.css">
            </div>
            <div class="file-templates">
                <span class="template-label">Quick templates:</span>
                <button class="template-btn" data-name="script.js">.js</button>
                <button class="template-btn" data-name="style.css">.css</button>
                <button class="template-btn" data-name="page.html">.html</button>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelAddFile">Cancel</button>
                <button class="btn btn-primary" id="confirmAddFile">Add File</button>
            </div>
        </div>
    </div>
    
    <!-- Rename Modal -->
    <div class="modal" id="renameModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3 id="renameModalTitle">Rename</h3>
                <button class="modal-close" id="closeRenameModal">&times;</button>
            </div>
            <div class="form-group">
                <label for="renameInput">New Name</label>
                <input type="text" id="renameInput">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="cancelRename">Cancel</button>
                <button class="btn btn-primary" id="confirmRename">Rename</button>
            </div>
        </div>
    </div>
    
    <!-- WebGL Test Window -->
    <div class="webgl-overlay" id="webglOverlay" style="display: none;">
        <div class="webgl-test-window" id="webglTestWindow">
            <div class="webgl-header">
                <div class="webgl-title">
                    <span class="webgl-icon">🎲</span>
                    <span>WebGL Test Environment</span>
                </div>
                <div class="webgl-controls">
                    <button id="refreshWebgl" class="webgl-btn" title="Refresh">🔄</button>
                    <button id="closeWebglTest" class="webgl-btn close" title="Close">✕</button>
                </div>
            </div>
            <iframe id="webglFrame" class="webgl-frame"></iframe>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
