<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameForge IDE - 2D/3D Game Engine</title>
</head>

<!-- ============================================== -->
<!-- STYLE SECTION -->
<!-- ============================================== -->
<style>
    /* ===== CSS RESET & BASE ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    :root {
        --bg-dark: #0a0a1a;
        --bg-darker: #050510;
        --bg-card: #12122a;
        --bg-input: #1a1a3a;
        --neon-blue: #00d4ff;
        --neon-purple: #b347ff;
        --neon-green: #00ff88;
        --neon-pink: #ff47ab;
        --neon-orange: #ff8800;
        --text-primary: #ffffff;
        --text-secondary: #a0a0c0;
        --border-glow: 0 0 10px var(--neon-blue), 0 0 20px rgba(0, 212, 255, 0.3);
        --font-mono: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-dark);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* ===== STARFIELD BACKGROUND ===== */
    .starfield {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        background: 
            radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 50%, #050510 100%);
    }

    .stars {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
            radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
            radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
            radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
            radial-gradient(1px 1px at 230px 80px, #ffffff, transparent),
            radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
            radial-gradient(1px 1px at 370px 50px, #ffffff, transparent),
            radial-gradient(2px 2px at 450px 180px, rgba(255,255,255,0.8), transparent),
            radial-gradient(1px 1px at 520px 90px, #ffffff, transparent),
            radial-gradient(2px 2px at 600px 200px, rgba(255,255,255,0.6), transparent);
        background-size: 650px 250px;
        animation: twinkle 8s ease-in-out infinite;
    }

    .stars:nth-child(2) {
        background-position: 100px 50px;
        animation-delay: -2s;
        opacity: 0.5;
    }

    .stars:nth-child(3) {
        background-position: 200px 100px;
        animation-delay: -4s;
        opacity: 0.3;
    }

    @keyframes twinkle {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    /* ===== VIEW CONTAINERS ===== */
    .view {
        display: none;
        min-height: 100vh;
    }

    .view.active {
        display: flex;
    }

    /* ===== AUTHENTICATION VIEW ===== */
    #auth-view {
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
    }

    .auth-container {
        background: linear-gradient(145deg, var(--bg-card), var(--bg-darker));
        border: 2px solid var(--neon-blue);
        border-radius: 20px;
        padding: 50px;
        width: 100%;
        max-width: 450px;
        box-shadow: var(--border-glow), inset 0 0 50px rgba(0, 212, 255, 0.05);
        position: relative;
        overflow: hidden;
    }

    .auth-container::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent 30%);
        animation: rotate 6s linear infinite;
        opacity: 0.1;
    }

    @keyframes rotate {
        100% { transform: rotate(360deg); }
    }

    .auth-content {
        position: relative;
        z-index: 1;
    }

    .logo {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo h1 {
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        letter-spacing: 2px;
    }

    .logo p {
        color: var(--text-secondary);
        font-size: 0.95rem;
        margin-top: 8px;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    .auth-tabs {
        display: flex;
        margin-bottom: 30px;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .auth-tab {
        flex: 1;
        padding: 15px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
    }

    .auth-tab.active {
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
        color: white;
    }

    .auth-tab:hover:not(.active) {
        background: rgba(0, 212, 255, 0.1);
        color: var(--neon-blue);
    }

    .auth-form {
        display: none;
    }

    .auth-form.active {
        display: block;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        margin-bottom: 10px;
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .form-group input {
        width: 100%;
        padding: 15px 20px;
        background: var(--bg-input);
        border: 2px solid rgba(0, 212, 255, 0.2);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }

    .form-group input:focus {
        outline: none;
        border-color: var(--neon-blue);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .form-group input::placeholder {
        color: rgba(160, 160, 192, 0.5);
    }

    .btn {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .btn-primary {
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
        color: white;
        box-shadow: 0 5px 30px rgba(0, 212, 255, 0.4);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 40px rgba(0, 212, 255, 0.6);
    }

    .auth-message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        text-align: center;
        font-size: 0.9rem;
        display: none;
    }

    .auth-message.error {
        display: block;
        background: rgba(255, 71, 87, 0.2);
        border: 1px solid #ff4757;
        color: #ff4757;
    }

    .auth-message.success {
        display: block;
        background: rgba(0, 255, 136, 0.2);
        border: 1px solid var(--neon-green);
        color: var(--neon-green);
    }

    /* ===== HUB VIEW ===== */
    #hub-view {
        flex-direction: column;
        padding: 30px;
    }

    .hub-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        background: linear-gradient(135deg, var(--bg-card), var(--bg-darker));
        border: 1px solid rgba(0, 212, 255, 0.3);
        border-radius: 16px;
        margin-bottom: 30px;
        box-shadow: var(--border-glow);
    }

    .hub-header h2 {
        font-size: 1.5rem;
        color: var(--text-primary);
    }

    .hub-header h2 span {
        color: var(--neon-green);
    }

    .hub-actions {
        display: flex;
        gap: 15px;
    }

    .btn-create {
        padding: 12px 30px;
        background: linear-gradient(135deg, var(--neon-green), #00aa55);
        color: var(--bg-dark);
        border: none;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95rem;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-create:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 25px rgba(0, 255, 136, 0.5);
    }

    .btn-logout {
        padding: 12px 25px;
        background: transparent;
        border: 2px solid var(--neon-pink);
        color: var(--neon-pink);
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.95rem;
    }

    .btn-logout:hover {
        background: var(--neon-pink);
        color: var(--bg-dark);
    }

    .projects-section {
        flex: 1;
    }

    .section-title {
        font-size: 1.3rem;
        color: var(--text-secondary);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .section-title::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, rgba(0, 212, 255, 0.5), transparent);
    }

    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
    }

    .project-card {
        background: linear-gradient(145deg, var(--bg-card), var(--bg-darker));
        border: 2px solid rgba(179, 71, 255, 0.3);
        border-radius: 16px;
        padding: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .project-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
    }

    .project-card:hover {
        transform: translateY(-5px);
        border-color: var(--neon-purple);
        box-shadow: 0 10px 40px rgba(179, 71, 255, 0.3);
    }

    .project-card h3 {
        font-size: 1.3rem;
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    .project-card .project-meta {
        color: var(--text-secondary);
        font-size: 0.85rem;
    }

    .project-card .project-actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .project-card .btn-open {
        flex: 1;
        padding: 10px;
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-blue));
        border: none;
        border-radius: 8px;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .project-card .btn-delete {
        padding: 10px 15px;
        background: transparent;
        border: 1px solid #ff4757;
        border-radius: 8px;
        color: #ff4757;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .project-card .btn-delete:hover {
        background: #ff4757;
        color: white;
    }

    .empty-state {
        text-align: center;
        padding: 80px 40px;
        color: var(--text-secondary);
    }

    .empty-state .icon {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.3;
    }

    .empty-state h3 {
        font-size: 1.5rem;
        margin-bottom: 10px;
        color: var(--text-primary);
    }

    /* ===== EDITOR VIEW ===== */
    #editor-view {
        flex-direction: column;
        height: 100vh;
    }

    .editor-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 25px;
        background: linear-gradient(135deg, var(--bg-card), var(--bg-darker));
        border-bottom: 2px solid rgba(0, 212, 255, 0.3);
    }

    .editor-topbar .project-info {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .editor-topbar .project-name {
        font-size: 1.3rem;
        font-weight: 700;
        color: var(--neon-blue);
    }

    .editor-topbar .save-status {
        font-size: 0.85rem;
        color: var(--text-secondary);
        padding: 5px 12px;
        background: rgba(0, 255, 136, 0.1);
        border-radius: 20px;
        border: 1px solid rgba(0, 255, 136, 0.3);
    }

    .editor-topbar .topbar-actions {
        display: flex;
        gap: 12px;
    }

    .btn-save {
        padding: 10px 25px;
        background: linear-gradient(135deg, var(--neon-green), #00aa55);
        color: var(--bg-dark);
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-save:hover {
        box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
    }

    .btn-run {
        padding: 10px 25px;
        background: linear-gradient(135deg, var(--neon-orange), #ff5500);
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .btn-run:hover {
        box-shadow: 0 5px 20px rgba(255, 136, 0, 0.4);
    }

    .btn-exit {
        padding: 10px 20px;
        background: transparent;
        border: 2px solid var(--text-secondary);
        color: var(--text-secondary);
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-exit:hover {
        border-color: var(--neon-pink);
        color: var(--neon-pink);
    }

    .editor-main {
        display: flex;
        flex: 1;
        overflow: hidden;
    }

    .editor-panels {
        width: 50%;
        display: flex;
        flex-direction: column;
        border-right: 2px solid rgba(0, 212, 255, 0.2);
        overflow: hidden;
    }

    .editor-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        overflow: hidden;
    }

    .editor-panel:last-child {
        border-bottom: none;
    }

    .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
        background: var(--bg-darker);
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
    }

    .panel-header .lang-badge {
        padding: 4px 12px;
        border-radius: 15px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .panel-header .lang-badge.html {
        background: rgba(255, 136, 0, 0.2);
        color: var(--neon-orange);
        border: 1px solid rgba(255, 136, 0, 0.3);
    }

    .panel-header .lang-badge.css {
        background: rgba(0, 212, 255, 0.2);
        color: var(--neon-blue);
        border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .panel-header .lang-badge.js {
        background: rgba(255, 255, 0, 0.2);
        color: #ffff00;
        border: 1px solid rgba(255, 255, 0, 0.3);
    }

    .code-editor {
        flex: 1;
        width: 100%;
        padding: 15px;
        background: var(--bg-darker);
        border: none;
        color: var(--text-primary);
        font-family: var(--font-mono);
        font-size: 14px;
        line-height: 1.6;
        resize: none;
        outline: none;
        tab-size: 2;
    }

    .code-editor:focus {
        background: #0d0d20;
    }

    .preview-panel {
        width: 50%;
        display: flex;
        flex-direction: column;
        background: var(--bg-darker);
    }

    .preview-header {
        padding: 10px 15px;
        background: var(--bg-darker);
        border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .preview-header h3 {
        font-size: 0.9rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .preview-frame {
        flex: 1;
        width: 100%;
        border: none;
        background: white;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    .modal-overlay.active {
        display: flex;
    }

    .modal {
        background: linear-gradient(145deg, var(--bg-card), var(--bg-darker));
        border: 2px solid var(--neon-purple);
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 0 50px rgba(179, 71, 255, 0.3);
    }

    .modal h3 {
        font-size: 1.5rem;
        margin-bottom: 25px;
        color: var(--neon-purple);
    }

    .modal-actions {
        display: flex;
        gap: 15px;
        margin-top: 25px;
    }

    .modal-actions .btn {
        flex: 1;
        padding: 12px;
        font-size: 0.95rem;
    }

    .btn-secondary {
        background: transparent;
        border: 2px solid var(--text-secondary);
        color: var(--text-secondary);
    }

    .btn-secondary:hover {
        border-color: var(--neon-blue);
        color: var(--neon-blue);
    }

    /* ===== TOAST NOTIFICATIONS ===== */
    .toast-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 2000;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .toast {
        padding: 15px 25px;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.3);
    }

    .toast.success {
        background: linear-gradient(135deg, var(--neon-green), #00aa55);
    }

    .toast.error {
        background: linear-gradient(135deg, #ff4757, #c92a2a);
    }

    .toast.info {
        background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    }

    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    @keyframes fadeOut {
        to {
            opacity: 0;
            transform: translateX(100%);
        }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
        .editor-main {
            flex-direction: column;
        }

        .editor-panels {
            width: 100%;
            height: 50%;
            border-right: none;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }

        .preview-panel {
            width: 100%;
            height: 50%;
        }
    }

    @media (max-width: 768px) {
        .hub-header {
            flex-direction: column;
            gap: 20px;
            text-align: center;
        }

        .auth-container {
            padding: 30px;
        }

        .logo h1 {
            font-size: 2rem;
        }

        .editor-topbar {
            flex-direction: column;
            gap: 15px;
        }

        .topbar-actions {
            width: 100%;
            justify-content: center;
        }
    }
</style>

<!-- ============================================== -->
<!-- HTML SECTION -->
<!-- ============================================== -->
<body>
    <!-- Starfield Background -->
    <div class="starfield">
        <div class="stars"></div>
        <div class="stars"></div>
        <div class="stars"></div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ===== VIEW 1: AUTHENTICATION ===== -->
    <div id="auth-view" class="view">
        <div class="auth-container">
            <div class="auth-content">
                <div class="logo">
                    <h1>⚡ GameForge</h1>
                    <p>2D/3D Game Engine IDE</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" data-tab="login">Login</button>
                    <button class="auth-tab" data-tab="signup">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Launch Session</button>
                    <div id="login-message" class="auth-message"></div>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Account</button>
                    <div id="signup-message" class="auth-message"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- ===== VIEW 2: THE HUB ===== -->
    <div id="hub-view" class="view">
        <header class="hub-header">
            <h2>Welcome, <span id="username-display">Developer</span>! 🚀</h2>
            <div class="hub-actions">
                <button class="btn-create" id="btn-new-project">
                    <span>✨</span> New Project
                </button>
                <button class="btn-logout" id="btn-logout">Logout</button>
            </div>
        </header>

        <section class="projects-section">
            <h3 class="section-title">📁 Your Projects</h3>
            <div class="projects-grid" id="projects-grid">
                <!-- Projects will be rendered here -->
            </div>
        </section>
    </div>

    <!-- ===== VIEW 3: THE EDITOR ===== -->
    <div id="editor-view" class="view">
        <header class="editor-topbar">
            <div class="project-info">
                <span class="project-name" id="editor-project-name">Untitled Project</span>
                <span class="save-status" id="save-status">All changes saved</span>
            </div>
            <div class="topbar-actions">
                <button class="btn-save" id="btn-save">
                    <span>💾</span> Save
                </button>
                <button class="btn-run" id="btn-run">
                    <span>▶️</span> Run
                </button>
                <button class="btn-exit" id="btn-exit">← Exit to Hub</button>
            </div>
        </header>

        <main class="editor-main">
            <div class="editor-panels">
                <!-- HTML Panel -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="lang-badge html">HTML</span>
                    </div>
                    <textarea class="code-editor" id="html-editor" placeholder="<!-- Write your HTML here -->" spellcheck="false"></textarea>
                </div>

                <!-- CSS Panel -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="lang-badge css">CSS</span>
                    </div>
                    <textarea class="code-editor" id="css-editor" placeholder="/* Write your CSS here */" spellcheck="false"></textarea>
                </div>

                <!-- JavaScript Panel -->
                <div class="editor-panel">
                    <div class="panel-header">
                        <span class="lang-badge js">JavaScript</span>
                    </div>
                    <textarea class="code-editor" id="js-editor" placeholder="// Write your JavaScript here" spellcheck="false"></textarea>
                </div>
            </div>

            <div class="preview-panel">
                <div class="preview-header">
                    <h3>🎮 Game Preview</h3>
                </div>
                <iframe class="preview-frame" id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
        </main>
    </div>

    <!-- ===== MODAL: NEW PROJECT ===== -->
    <div class="modal-overlay" id="modal-new-project">
        <div class="modal">
            <h3>✨ Create New Project</h3>
            <div class="form-group">
                <label for="new-project-name">Project Name</label>
                <input type="text" id="new-project-name" placeholder="My Awesome Game">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-project">Cancel</button>
                <button class="btn btn-primary" id="btn-confirm-project">Create</button>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: DELETE CONFIRMATION ===== -->
    <div class="modal-overlay" id="modal-delete-project">
        <div class="modal">
            <h3>🗑️ Delete Project?</h3>
            <p style="color: var(--text-secondary); margin-bottom: 10px;">
                Are you sure you want to delete "<span id="delete-project-name"></span>"?
            </p>
            <p style="color: #ff4757; font-size: 0.9rem;">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="btn-cancel-delete">Cancel</button>
                <button class="btn btn-primary" style="background: linear-gradient(135deg, #ff4757, #c92a2a);" id="btn-confirm-delete">Delete</button>
            </div>
        </div>
    </div>
</body>

<!-- ============================================== -->
<!-- SCRIPT SECTION -->
<!-- ============================================== -->
<script>
    // ============================================
    // MOCK BACKEND CLASS
    // ============================================
    class MockBackend {
        constructor() {
            this.USERS_KEY = 'gameforge_users';
            this.PROJECTS_KEY = 'gameforge_projects';
            this.SESSION_KEY = 'gameforge_session';
            this.init();
        }

        // Initialize localStorage with empty arrays if not exists
        init() {
            if (!localStorage.getItem(this.USERS_KEY)) {
                localStorage.setItem(this.USERS_KEY, JSON.stringify([]));
            }
            if (!localStorage.getItem(this.PROJECTS_KEY)) {
                localStorage.setItem(this.PROJECTS_KEY, JSON.stringify([]));
            }
        }

        // Generate unique ID
        generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // ===== USER METHODS =====
        getUsers() {
            return JSON.parse(localStorage.getItem(this.USERS_KEY)) || [];
        }

        saveUsers(users) {
            localStorage.setItem(this.USERS_KEY, JSON.stringify(users));
        }

        findUserByUsername(username) {
            const users = this.getUsers();
            return users.find(u => u.username.toLowerCase() === username.toLowerCase());
        }

        createUser(username, password) {
            if (this.findUserByUsername(username)) {
                return { success: false, error: 'Username already exists' };
            }

            const users = this.getUsers();
            const newUser = {
                id: this.generateId(),
                username: username,
                password: password // In real app, this would be hashed
            };
            users.push(newUser);
            this.saveUsers(users);

            return { success: true, user: { id: newUser.id, username: newUser.username } };
        }

        login(username, password) {
            const user = this.findUserByUsername(username);
            if (!user) {
                return { success: false, error: 'User not found' };
            }
            if (user.password !== password) {
                return { success: false, error: 'Invalid password' };
            }

            // Create session
            const session = { userId: user.id, username: user.username };
            localStorage.setItem(this.SESSION_KEY, JSON.stringify(session));

            return { success: true, user: session };
        }

        logout() {
            localStorage.removeItem(this.SESSION_KEY);
        }

        getCurrentSession() {
            const session = localStorage.getItem(this.SESSION_KEY);
            return session ? JSON.parse(session) : null;
        }

        // ===== PROJECT METHODS =====
        getProjects() {
            return JSON.parse(localStorage.getItem(this.PROJECTS_KEY)) || [];
        }

        saveProjects(projects) {
            localStorage.setItem(this.PROJECTS_KEY, JSON.stringify(projects));
        }

        getUserProjects(userId) {
            const projects = this.getProjects();
            return projects.filter(p => p.userId === userId);
        }

        getProjectById(projectId) {
            const projects = this.getProjects();
            return projects.find(p => p.id === projectId);
        }

        createProject(userId, name) {
            const projects = this.getProjects();
            const newProject = {
                id: this.generateId(),
                userId: userId,
                name: name,
                htmlCode: this.getDefaultHTML(),
                cssCode: this.getDefaultCSS(),
                jsCode: this.getDefaultJS(),
                lastModified: new Date().toISOString()
            };
            projects.push(newProject);
            this.saveProjects(projects);
            return newProject;
        }

        updateProject(projectId, updates) {
            const projects = this.getProjects();
            const index = projects.findIndex(p => p.id === projectId);
            if (index !== -1) {
                projects[index] = {
                    ...projects[index],
                    ...updates,
                    lastModified: new Date().toISOString()
                };
                this.saveProjects(projects);
                return projects[index];
            }
            return null;
        }

        deleteProject(projectId) {
            const projects = this.getProjects();
            const filtered = projects.filter(p => p.id !== projectId);
            this.saveProjects(filtered);
        }

        // ===== DEFAULT CODE TEMPLATES =====
        getDefaultHTML() {
            return `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Game</title>
    <style id="game-styles"></style>
</head>
<body>
    <div id="game-container"></div>
    <script id="game-script"><\/script>
</body>
</html>`;
        }

        getDefaultCSS() {
            return `/* Game Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: #000;
}

#game-container {
    width: 100vw;
    height: 100vh;
}

canvas {
    display: block;
}`;
        }

        getDefaultJS() {
            return `// 🎮 GameForge - Three.js 3D Spinning Cube Demo
// This demonstrates the 3D capability of your game engine!

// Import Three.js from CDN
const script = document.createElement('script');
script.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
script.onload = initGame;
document.head.appendChild(script);

function initGame() {
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    // Camera
    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.z = 5;

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('game-container').appendChild(renderer.domElement);

    // Create a Green Cube (The classic demo!)
    const geometry = new THREE.BoxGeometry(2, 2, 2);
    const material = new THREE.MeshPhongMaterial({
        color: 0x00ff88,
        shininess: 100,
        emissive: 0x002211
    });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Add some edge glow
    const edges = new THREE.EdgesGeometry(geometry);
    const lineMaterial = new THREE.LineBasicMaterial({ 
        color: 0x00ffff,
        linewidth: 2
    });
    const wireframe = new THREE.LineSegments(edges, lineMaterial);
    cube.add(wireframe);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0x00d4ff, 1, 100);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    const pointLight2 = new THREE.PointLight(0xb347ff, 0.8, 100);
    pointLight2.position.set(-5, -5, 5);
    scene.add(pointLight2);

    // Add floating particles
    const particleGeometry = new THREE.BufferGeometry();
    const particleCount = 500;
    const positions = new Float32Array(particleCount * 3);
    
    for (let i = 0; i < particleCount * 3; i += 3) {
        positions[i] = (Math.random() - 0.5) * 20;
        positions[i + 1] = (Math.random() - 0.5) * 20;
        positions[i + 2] = (Math.random() - 0.5) * 20;
    }
    
    particleGeometry.setAttribute('position', 
        new THREE.BufferAttribute(positions, 3)
    );
    
    const particleMaterial = new THREE.PointsMaterial({
        color: 0x00d4ff,
        size: 0.05,
        transparent: true,
        opacity: 0.8
    });
    
    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);

        // Rotate the cube
        cube.rotation.x += 0.01;
        cube.rotation.y += 0.015;

        // Rotate particles slowly
        particles.rotation.y += 0.001;

        // Render
        renderer.render(scene, camera);
    }

    // Handle window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Start animation
    animate();

    console.log('🎮 GameForge 3D Engine Initialized!');
    console.log('✨ Modify this code to create your own game!');
}`;
        }
    }

    // ============================================
    // APPLICATION STATE
    // ============================================
    const App = {
        backend: new MockBackend(),
        currentUser: null,
        currentProject: null,
        projectToDelete: null,

        // DOM Elements
        views: {
            auth: document.querySelector('#auth-view'),
            hub: document.querySelector('#hub-view'),
            editor: document.querySelector('#editor-view')
        },

        // Initialize the application
        init() {
            this.bindEvents();
            this.checkSession();
        },

        // Check for existing session on page load
        checkSession() {
            const session = this.backend.getCurrentSession();
            if (session) {
                this.currentUser = session;
                this.showView('hub');
                this.renderProjects();
            } else {
                this.showView('auth');
            }
        },

        // Switch between views
        showView(viewName) {
            Object.values(this.views).forEach(view => view.classList.remove('active'));
            
            if (viewName === 'auth') {
                this.views.auth.classList.add('active');
            } else if (viewName === 'hub') {
                this.views.hub.classList.add('active');
                document.querySelector('#username-display').textContent = this.currentUser.username;
                this.renderProjects();
            } else if (viewName === 'editor') {
                this.views.editor.classList.add('active');
            }
        },

        // Show toast notification
        showToast(message, type = 'info') {
            const container = document.querySelector('#toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        },

        // Bind all event listeners
        bindEvents() {
            // Auth tab switching
            document.querySelectorAll('.auth-tab').forEach(tab => {
                tab.addEventListener('click', (e) => {
                    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                    
                    e.target.classList.add('active');
                    const formId = e.target.dataset.tab + '-form';
                    document.querySelector('#' + formId).classList.add('active');
                });
            });

            // Login form
            document.querySelector('#login-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.querySelector('#login-username').value.trim();
                const password = document.querySelector('#login-password').value;
                
                const result = this.backend.login(username, password);
                const messageEl = document.querySelector('#login-message');
                
                if (result.success) {
                    messageEl.className = 'auth-message success';
                    messageEl.textContent = 'Login successful! Launching...';
                    this.currentUser = result.user;
                    
                    setTimeout(() => {
                        this.showView('hub');
                        this.showToast('Welcome back, ' + this.currentUser.username + '! 🚀', 'success');
                    }, 500);
                } else {
                    messageEl.className = 'auth-message error';
                    messageEl.textContent = result.error;
                }
            });

            // Signup form
            document.querySelector('#signup-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const username = document.querySelector('#signup-username').value.trim();
                const password = document.querySelector('#signup-password').value;
                const confirm = document.querySelector('#signup-confirm').value;
                
                const messageEl = document.querySelector('#signup-message');

                if (password !== confirm) {
                    messageEl.className = 'auth-message error';
                    messageEl.textContent = 'Passwords do not match';
                    return;
                }

                if (username.length < 3) {
                    messageEl.className = 'auth-message error';
                    messageEl.textContent = 'Username must be at least 3 characters';
                    return;
                }

                if (password.length < 4) {
                    messageEl.className = 'auth-message error';
                    messageEl.textContent = 'Password must be at least 4 characters';
                    return;
                }

                const result = this.backend.createUser(username, password);
                
                if (result.success) {
                    messageEl.className = 'auth-message success';
                    messageEl.textContent = 'Account created! You can now login.';
                    
                    // Switch to login tab
                    setTimeout(() => {
                        document.querySelector('.auth-tab[data-tab="login"]').click();
                        document.querySelector('#login-username').value = username;
                    }, 1000);
                } else {
                    messageEl.className = 'auth-message error';
                    messageEl.textContent = result.error;
                }
            });

            // Logout
            document.querySelector('#btn-logout').addEventListener('click', () => {
                this.backend.logout();
                this.currentUser = null;
                this.currentProject = null;
                this.showView('auth');
                this.showToast('Logged out successfully', 'info');
                
                // Clear forms
                document.querySelectorAll('.auth-form input').forEach(input => input.value = '');
                document.querySelectorAll('.auth-message').forEach(msg => msg.className = 'auth-message');
            });

            // New Project Modal
            document.querySelector('#btn-new-project').addEventListener('click', () => {
                document.querySelector('#modal-new-project').classList.add('active');
                document.querySelector('#new-project-name').value = '';
                document.querySelector('#new-project-name').focus();
            });

            document.querySelector('#btn-cancel-project').addEventListener('click', () => {
                document.querySelector('#modal-new-project').classList.remove('active');
            });

            document.querySelector('#btn-confirm-project').addEventListener('click', () => {
                const name = document.querySelector('#new-project-name').value.trim();
                if (name) {
                    const project = this.backend.createProject(this.currentUser.userId, name);
                    document.querySelector('#modal-new-project').classList.remove('active');
                    this.showToast('Project "' + name + '" created! 🎮', 'success');
                    this.openProject(project.id);
                } else {
                    this.showToast('Please enter a project name', 'error');
                }
            });

            // Delete Project Modal
            document.querySelector('#btn-cancel-delete').addEventListener('click', () => {
                document.querySelector('#modal-delete-project').classList.remove('active');
                this.projectToDelete = null;
            });

            document.querySelector('#btn-confirm-delete').addEventListener('click', () => {
                if (this.projectToDelete) {
                    this.backend.deleteProject(this.projectToDelete);
                    document.querySelector('#modal-delete-project').classList.remove('active');
                    this.showToast('Project deleted', 'info');
                    this.renderProjects();
                    this.projectToDelete = null;
                }
            });

            // Close modals on overlay click
            document.querySelectorAll('.modal-overlay').forEach(overlay => {
                overlay.addEventListener('click', (e) => {
                    if (e.target === overlay) {
                        overlay.classList.remove('active');
                    }
                });
            });

            // Editor buttons
            document.querySelector('#btn-save').addEventListener('click', () => {
                this.saveProject();
            });

            document.querySelector('#btn-run').addEventListener('click', () => {
                this.runPreview();
            });

            document.querySelector('#btn-exit').addEventListener('click', () => {
                this.saveProject();
                this.currentProject = null;
                this.showView('hub');
            });

            // Code editor change tracking
            document.querySelectorAll('.code-editor').forEach(editor => {
                editor.addEventListener('input', () => {
                    document.querySelector('#save-status').textContent = 'Unsaved changes';
                    document.querySelector('#save-status').style.color = 'var(--neon-orange)';
                    document.querySelector('#save-status').style.borderColor = 'rgba(255, 136, 0, 0.3)';
                    document.querySelector('#save-status').style.background = 'rgba(255, 136, 0, 0.1)';
                });
            });

            // Tab key handling in code editors
            document.querySelectorAll('.code-editor').forEach(editor => {
                editor.addEventListener('keydown', (e) => {
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        const start = editor.selectionStart;
                        const end = editor.selectionEnd;
                        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
                        editor.selectionStart = editor.selectionEnd = start + 2;
                    }
                });
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 's') {
                        e.preventDefault();
                        if (this.currentProject) {
                            this.saveProject();
                        }
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (this.currentProject) {
                            this.runPreview();
                        }
                    }
                }
            });

            // Enter key in new project modal
            document.querySelector('#new-project-name').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    document.querySelector('#btn-confirm-project').click();
                }
            });
        },

        // Render project cards in the hub
        renderProjects() {
            const grid = document.querySelector('#projects-grid');
            const projects = this.backend.getUserProjects(this.currentUser.userId);

            if (projects.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="icon">🎮</div>
                        <h3>No Projects Yet</h3>
                        <p>Click "New Project" to create your first game!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = projects.map(project => {
                const lastModified = new Date(project.lastModified);
                const timeAgo = this.getTimeAgo(lastModified);
                
                return `
                    <div class="project-card" data-id="${project.id}">
                        <h3>${this.escapeHtml(project.name)}</h3>
                        <p class="project-meta">Last modified: ${timeAgo}</p>
                        <div class="project-actions">
                            <button class="btn-open" data-id="${project.id}">Open Project</button>
                            <button class="btn-delete" data-id="${project.id}" data-name="${this.escapeHtml(project.name)}">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');

            // Bind project card events
            grid.querySelectorAll('.btn-open').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.openProject(btn.dataset.id);
                });
            });

            grid.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    this.projectToDelete = btn.dataset.id;
                    document.querySelector('#delete-project-name').textContent = btn.dataset.name;
                    document.querySelector('#modal-delete-project').classList.add('active');
                });
            });

            grid.querySelectorAll('.project-card').forEach(card => {
                card.addEventListener('click', () => {
                    this.openProject(card.dataset.id);
                });
            });
        },

        // Open a project in the editor
        openProject(projectId) {
            const project = this.backend.getProjectById(projectId);
            if (!project) {
                this.showToast('Project not found', 'error');
                return;
            }

            this.currentProject = project;
            
            // Update editor UI
            document.querySelector('#editor-project-name').textContent = project.name;
            document.querySelector('#html-editor').value = project.htmlCode;
            document.querySelector('#css-editor').value = project.cssCode;
            document.querySelector('#js-editor').value = project.jsCode;

            // Reset save status
            const saveStatus = document.querySelector('#save-status');
            saveStatus.textContent = 'All changes saved';
            saveStatus.style.color = '';
            saveStatus.style.borderColor = '';
            saveStatus.style.background = '';

            this.showView('editor');
            
            // Auto-run preview
            setTimeout(() => this.runPreview(), 100);
        },

        // Save current project
        saveProject() {
            if (!this.currentProject) return;

            const htmlCode = document.querySelector('#html-editor').value;
            const cssCode = document.querySelector('#css-editor').value;
            const jsCode = document.querySelector('#js-editor').value;

            this.backend.updateProject(this.currentProject.id, {
                htmlCode,
                cssCode,
                jsCode
            });

            // Update local reference
            this.currentProject.htmlCode = htmlCode;
            this.currentProject.cssCode = cssCode;
            this.currentProject.jsCode = jsCode;

            // Update save status
            const saveStatus = document.querySelector('#save-status');
            saveStatus.textContent = 'All changes saved';
            saveStatus.style.color = 'var(--neon-green)';
            saveStatus.style.borderColor = 'rgba(0, 255, 136, 0.3)';
            saveStatus.style.background = 'rgba(0, 255, 136, 0.1)';

            this.showToast('Project saved! 💾', 'success');
        },

        // Run the game preview
        runPreview() {
            const htmlCode = document.querySelector('#html-editor').value;
            const cssCode = document.querySelector('#css-editor').value;
            const jsCode = document.querySelector('#js-editor').value;

            // Build the complete HTML document
            const fullHTML = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
${cssCode}
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
(function() {
    try {
${jsCode}
    } catch(error) {
        document.body.innerHTML = '<div style="color: #ff4757; padding: 20px; font-family: monospace; background: #1a1a1a; height: 100vh;"><h2>⚠️ JavaScript Error</h2><pre>' + error.message + '</pre></div>';
        console.error(error);
    }
})();
    <\/script>
</body>
</html>`;

            // Create blob and set iframe source
            const blob = new Blob([fullHTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            const iframe = document.querySelector('#preview-frame');
            
            // Revoke previous blob URL to prevent memory leaks
            if (iframe.dataset.blobUrl) {
                URL.revokeObjectURL(iframe.dataset.blobUrl);
            }
            
            iframe.dataset.blobUrl = url;
            iframe.src = url;
        },

        // Helper: Get time ago string
        getTimeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            
            if (seconds < 60) return 'Just now';
            if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
            if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
            if (seconds < 604800) return Math.floor(seconds / 86400) + ' days ago';
            
            return date.toLocaleDateString();
        },

        // Helper: Escape HTML to prevent XSS
        escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    };

    // ============================================
    // INITIALIZE APPLICATION
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
        App.init();
    });
</script>
