<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameForge Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============ DASHBOARD ============ -->
    <div id="dashboard" class="view active">
        <header class="dash-header">
            <div class="logo">
                <div class="logo-icon">GF</div>
                <h1>GameForge</h1>
            </div>
            <button class="btn btn-primary" id="newProjectBtn">+ New Project</button>
        </header>
        <div class="dash-body">
            <input type="text" id="searchProjects" class="search-input" placeholder="🔍  Search projects...">
            <div id="projectGrid" class="project-grid"></div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📂</div>
                <h2>No Projects Yet</h2>
                <p>Click <strong>"+ New Project"</strong> to get started.</p>
            </div>
        </div>
    </div>

    <!-- ============ EDITOR ============ -->
    <div id="editor" class="view">
        <div class="editor-topbar">
            <div class="topbar-left">
                <button class="btn btn-ghost" id="backToDash">← Back</button>
                <span id="projectTypeBadge" class="badge">2D</span>
                <span id="editorProjectName" class="project-title" title="Click to rename project">Untitled</span>
            </div>
            <div class="topbar-right">
                <button class="btn btn-run" id="runProject">▶ Run</button>
                <button class="btn btn-delete" id="deleteProject">🗑 Delete Project</button>
            </div>
        </div>
        <div class="editor-main">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span>FILES</span>
                    <button class="btn-add-file" id="addFileBtn" title="Add new file">+</button>
                </div>
                <div id="fileList" class="file-list"></div>
            </aside>
            <div class="editor-area">
                <div id="codeTabs" class="tab-bar"></div>
                <div class="code-container">
                    <div id="lineNumbers" class="line-numbers"></div>
                    <textarea id="codeEditor" class="code-textarea" spellcheck="false"></textarea>
                </div>
            </div>
        </div>
    </div>

    <!-- ============ NEW PROJECT MODAL ============ -->
    <div id="newProjectModal" class="overlay">
        <div class="modal">
            <div class="modal-top">
                <h2>New Project</h2>
                <button class="btn-close" id="closeModal">×</button>
            </div>
            <div class="modal-content">
                <label class="field-label">Project Name</label>
                <input type="text" id="projectName" class="field-input" placeholder="My Awesome Game" maxlength="50">
                <label class="field-label" style="margin-top:20px;">Project Type</label>
                <div class="type-picker">
                    <div class="type-option selected" data-type="2d">
                        <div class="type-emoji">🎮</div>
                        <strong>2D Game</strong>
                        <small>Canvas-based 2D game</small>
                    </div>
                    <div class="type-option" data-type="app">
                        <div class="type-emoji">🌐</div>
                        <strong>Web App</strong>
                        <small>Standard HTML/CSS/JS</small>
                    </div>
                    <div class="type-option" data-type="webgl">
                        <div class="type-emoji">🧊</div>
                        <strong>WebGL 3D</strong>
                        <small>3D WebGL rendering</small>
                    </div>
                </div>
            </div>
            <div class="modal-bottom">
                <button class="btn btn-cancel" id="cancelProject">Cancel</button>
                <button class="btn btn-primary" id="createProject">Create</button>
            </div>
        </div>
    </div>

    <!-- ============ RENAME MODAL ============ -->
    <div id="renameModal" class="overlay">
        <div class="modal modal-small">
            <div class="modal-top">
                <h2 id="renameModalTitle">Rename</h2>
                <button class="btn-close" id="closeRenameModal">×</button>
            </div>
            <div class="modal-content">
                <label class="field-label" id="renameLabel">New Name</label>
                <input type="text" id="renameInput" class="field-input" maxlength="50">
            </div>
            <div class="modal-bottom">
                <button class="btn btn-cancel" id="cancelRename">Cancel</button>
                <button class="btn btn-primary" id="confirmRename">Rename</button>
            </div>
        </div>
    </div>

    <!-- ============ ADD FILE MODAL ============ -->
    <div id="addFileModal" class="overlay">
        <div class="modal modal-small">
            <div class="modal-top">
                <h2>Add File</h2>
                <button class="btn-close" id="closeAddFileModal">×</button>
            </div>
            <div class="modal-content">
                <label class="field-label">File name (with extension)</label>
                <input type="text" id="newFileName" class="field-input" placeholder="utils.js">
            </div>
            <div class="modal-bottom">
                <button class="btn btn-cancel" id="cancelAddFile">Cancel</button>
                <button class="btn btn-primary" id="confirmAddFile">Add</button>
            </div>
        </div>
    </div>

    <!-- ============ WEBGL PREVIEW ============ -->
    <div id="webglPreview" class="webgl-window">
        <div class="webgl-titlebar" id="webglTitlebar">
            <span>WebGL Preview</span>
            <div class="webgl-btns">
                <button class="wgl-btn" id="webglReload" title="Reload">↻</button>
                <button class="wgl-btn wgl-btn-close" id="webglClose" title="Close">×</button>
            </div>
        </div>
        <iframe id="webglFrame" class="webgl-iframe"></iframe>
        <div class="webgl-resize" id="webglResizeHandle"></div>
    </div>

    <!-- ============ RIGHT-CLICK MENU ============ -->
    <div id="contextMenu" class="ctx-menu">
        <div class="ctx-item" data-action="rename">✏️ Rename</div>
        <div class="ctx-item" data-action="duplicate">📋 Duplicate</div>
        <div class="ctx-item ctx-danger" data-action="delete">🗑️ Delete</div>
    </div>

    <!-- ============ TOASTS ============ -->
    <div id="toastContainer" class="toast-wrap"></div>

    <script src="app.js"></script>
</body>
</html>
