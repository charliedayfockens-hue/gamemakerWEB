<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Game Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Project Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Projects</h2>
                <button id="newProjectBtn" class="btn-primary">+ New Project</button>
            </div>
            <div id="projectList" class="project-list"></div>
        </div>

        <!-- Editor Area -->
        <div class="editor-container">
            <div class="editor-header">
                <h1 id="projectTitle">Select or Create a Project</h1>
                <div class="header-actions">
                    <button id="runBtn" class="btn-run" disabled>▶ Run</button>
                    <button id="deleteProjectBtn" class="btn-delete" disabled>🗑 Delete</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="html">HTML</button>
                <button class="tab-btn" data-tab="css">CSS</button>
                <button class="tab-btn" data-tab="js">JavaScript</button>
            </div>

            <div class="editor-panels">
                <textarea id="htmlEditor" class="editor active" placeholder="Write your HTML here..."></textarea>
                <textarea id="cssEditor" class="editor" placeholder="Write your CSS here..."></textarea>
                <textarea id="jsEditor" class="editor" placeholder="Write your JavaScript here..."></textarea>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h2>Create New Project</h2>
            <input type="text" id="projectNameInput" placeholder="Project Name" maxlength="50">
            <div class="modal-actions">
                <button id="createProjectBtn" class="btn-primary">Create</button>
                <button id="cancelModalBtn" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
