<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGL Game Editor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h1>WebGL Game Editor</h1>
            </div>
            <div class="header-actions">
                <button id="newProjectBtn" class="btn btn-primary">
                    <span>+</span> New Project
                </button>
                <button id="runProjectBtn" class="btn btn-success">
                    <span>▶</span> Run Project
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <div class="section-header">
                        <h3>📁 Projects</h3>
                    </div>
                    <div id="projectsList" class="projects-list"></div>
                </div>
                
                <div class="sidebar-section" id="filesSection" style="display: none;">
                    <div class="section-header">
                        <h3>📄 Files</h3>
                        <button id="addFileBtn" class="btn btn-small">+ Add</button>
                    </div>
                    <div id="filesList" class="files-list"></div>
                </div>
            </aside>

            <!-- Editor Area -->
            <main class="editor-area">
                <div class="editor-header">
                    <div id="filesTabs" class="files-tabs"></div>
                    <div id="currentFileInfo" class="current-file-info"></div>
                </div>
                <div class="editor-container">
                    <div class="line-numbers" id="lineNumbers"></div>
                    <textarea id="codeEditor" 
                              placeholder="Select a file to start editing..."
                              spellcheck="false"></textarea>
                </div>
                <div class="editor-footer">
                    <span id="cursorPosition">Ln 1, Col 1</span>
                    <span id="fileType">--</span>
                    <span id="autoSaveStatus">Auto-save enabled</span>
                </div>
            </main>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="newProjectModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>🚀 Create New Project</h2>
                <button class="modal-close" data-modal="newProjectModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="projectNameInput">Project Name</label>
                    <input type="text" id="projectNameInput" placeholder="My Awesome Game">
                </div>
                <div class="form-group">
                    <label for="projectTypeSelect">Project Type</label>
                    <select id="projectTypeSelect">
                        <option value="2d">🎮 2D Game</option>
                        <option value="app">📱 Web App</option>
                        <option value="3d">🎲 WebGL (3D Game)</option>
                    </select>
                </div>
                <div class="project-type-info" id="projectTypeInfo">
                    <p>Create a 2D canvas-based game with sprite rendering capabilities.</p>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancelProjectBtn" class="btn btn-secondary">Cancel</button>
                <button id="createProjectBtn" class="btn btn-primary">Create Project</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div id="renameModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="renameTitle">✏️ Rename</h2>
                <button class="modal-close" data-modal="renameModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="renameInput">New Name</label>
                    <input type="text" id="renameInput" placeholder="Enter new name">
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancelRenameBtn" class="btn btn-secondary">Cancel</button>
                <button id="confirmRenameBtn" class="btn btn-primary">Rename</button>
            </div>
        </div>
    </div>

    <!-- Add File Modal -->
    <div id="addFileModal" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>📄 Add New File</h2>
                <button class="modal-close" data-modal="addFileModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="newFileNameInput">File Name</label>
                    <input type="text" id="newFileNameInput" placeholder="script.js">
                </div>
                <div class="form-group">
                    <label>Quick Templates</label>
                    <div class="file-templates">
                        <button class="template-btn" data-ext=".html">HTML</button>
                        <button class="template-btn" data-ext=".css">CSS</button>
                        <button class="template-btn" data-ext=".js">JavaScript</button>
                        <button class="template-btn" data-ext=".json">JSON</button>
                    </div>
                </div>
            </div>
            <div class="modal-actions">
                <button id="cancelAddFileBtn" class="btn btn-secondary">Cancel</button>
                <button id="confirmAddFileBtn" class="btn btn-primary">Add File</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" data-action="rename">
            <span>✏️</span> Rename
        </div>
        <div class="context-menu-item" data-action="duplicate">
            <span>📋</span> Duplicate
        </div>
        <div class="context-menu-item context-menu-divider"></div>
        <div class="context-menu-item context-menu-danger" data-action="delete">
            <span>🗑️</span> Delete
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
